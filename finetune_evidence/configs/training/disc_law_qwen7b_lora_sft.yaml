### model
model_name_or_path: /root/autodl-tmp/models/Qwen2.5-7B-Instruct
trust_remote_code: true
quantization_bit: 4
quantization_method: bnb

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset: disc_law_labor_qa,disc_law_triplet_labor_qa,identity
template: qwen
cutoff_len: 2048
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
output_dir: saves/Qwen2.5-7B-Instruct/lora/disc_law_qwen7b_v1
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 5.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
max_grad_norm: 1.0

### eval
val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 200
